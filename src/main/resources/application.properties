spring.application.name=pdf-to-pdfa3

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pdftopdfa3}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway configuration
spring.flyway.enabled=true

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Async request timeout (in milliseconds) - 10 minutes
spring.mvc.async.request-timeout=600000

# Tomcat timeouts
server.tomcat.connection-timeout=600000
server.tomcat.keep-alive-timeout=600000
server.connection-timeout=600000

# Actuator configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# OpenAPI configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging configuration
logging.level.com.vcapelcin.pdf2zugferd=DEBUG

# Server port
server.port=8080

# PDF Conversion configuration
app.font-directory=${APP_FONT_DIRECTORY:src/main/resources/fonts}
app.pdf.validation-max-size=${APP_PDF_VALIDATION_MAX_SIZE:2MB}
